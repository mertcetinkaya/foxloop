<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ultra 60 Stampede</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#1a0e00;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; touch-action:none; user-select:none;
  -webkit-user-select:none;
}
canvas { display:block; touch-action:none; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W, H;
function resize() {
  W = cv.width = window.innerWidth;
  H = cv.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// AudioContext
const AC = new (window.AudioContext || window.webkitAudioContext)();
function sfx(type) {
  try {
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    if (type === 'score') {
      o.type = 'triangle';
      o.frequency.setValueAtTime(523, AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(1046, AC.currentTime + 0.15);
      g.gain.setValueAtTime(0.2, AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.25);
      o.start(); o.stop(AC.currentTime + 0.25);
    } else if (type === 'lost') {
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(300, AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(100, AC.currentTime + 0.3);
      g.gain.setValueAtTime(0.15, AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.3);
      o.start(); o.stop(AC.currentTime + 0.3);
    } else if (type === 'shoo') {
      o.type = 'sine';
      o.frequency.setValueAtTime(200, AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(400, AC.currentTime + 0.08);
      g.gain.setValueAtTime(0.12, AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.1);
      o.start(); o.stop(AC.currentTime + 0.1);
    } else if (type === 'levelup') {
      o.type = 'square';
      o.frequency.setValueAtTime(392, AC.currentTime);
      o.frequency.setValueAtTime(523, AC.currentTime + 0.1);
      o.frequency.setValueAtTime(659, AC.currentTime + 0.2);
      o.frequency.setValueAtTime(784, AC.currentTime + 0.3);
      g.gain.setValueAtTime(0.18, AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.45);
      o.start(); o.stop(AC.currentTime + 0.45);
    } else if (type === 'gameover') {
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(440, AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(110, AC.currentTime + 0.6);
      g.gain.setValueAtTime(0.2, AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.6);
      o.start(); o.stop(AC.currentTime + 0.6);
    }
  } catch(e) {}
}

// --- State ---
let gs = 'start';
let score = 0, best = +localStorage.getItem('stampede_best') || 0;
let timeLeft = 60, lastTick = 0;
let animals = [], particles = [], popups = [], ripples = [];
let throughGate = 0, level = 1;
let spawnTimer = 0, spawnInterval = 120; // frames
let frameCount = 0;
let shooX = -1, shooY = -1, shooTimer = 0;

// Gate geometry (right edge, centered)
function gateTop() { return H * 0.35; }
function gateBot() { return H * 0.65; }
const GATE_W = 18;

class Animal {
  constructor() {
    this.reset();
    this.flash = 0;
    this.flashColor = '#fff';
    this.dead = false;
  }
  reset() {
    const spd = 1.2 + level * 0.25 + Math.random() * 0.6;
    this.x = -20;
    this.y = gateTop() + (gateBot() - gateTop()) * 0.5 + (Math.random() - 0.5) * H * 0.5;
    this.y = Math.max(40, Math.min(H - 40, this.y));
    this.vx = spd;
    this.vy = (Math.random() - 0.5) * 0.8;
    this.r = 14 + Math.random() * 6;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpd = 0.04 + Math.random() * 0.03;
    this.brown = `hsl(${25 + Math.floor(Math.random()*20)},${60+Math.floor(Math.random()*20)}%,${40+Math.floor(Math.random()*20)}%)`;
  }
  update() {
    this.x += this.vx;
    this.wobble += this.wobbleSpd;
    this.vy += Math.sin(this.wobble) * 0.06;
    this.vy *= 0.95;
    this.y += this.vy;
    if (this.flash > 0) this.flash--;
    // boundary bounce top/bottom
    if (this.y < this.r) { this.y = this.r; this.vy = Math.abs(this.vy); }
    if (this.y > H - this.r) { this.y = H - this.r; this.vy = -Math.abs(this.vy); }
  }
  draw() {
    ctx.save();
    const fc = this.flash > 0 ? this.flashColor : null;
    // body
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = fc || this.brown;
    ctx.fill();
    // head bump
    ctx.beginPath();
    ctx.arc(this.x + this.r * 0.6, this.y - this.r * 0.3, this.r * 0.55, 0, Math.PI * 2);
    ctx.fillStyle = fc || this.brown;
    ctx.fill();
    // horns
    ctx.strokeStyle = fc || '#8B6914';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(this.x + this.r * 0.5, this.y - this.r * 0.75, this.r * 0.4, Math.PI, Math.PI * 1.6);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(this.x + this.r * 0.9, this.y - this.r * 0.75, this.r * 0.4, Math.PI * 1.4, Math.PI * 2);
    ctx.stroke();
    // eye
    ctx.beginPath();
    ctx.arc(this.x + this.r * 0.85, this.y - this.r * 0.35, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = fc ? fc : '#1a0e00';
    ctx.fill();
    ctx.restore();
  }
  applyForce(fx, fy, strength) {
    const dx = this.x - fx, dy = this.y - fy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 80 && dist > 0) {
      const f = strength * (1 - dist / 80);
      this.vx += (dx / dist) * f;
      this.vy += (dy / dist) * f;
    }
  }
}

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    const a = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 4;
    this.vx = Math.cos(a) * spd;
    this.vy = Math.sin(a) * spd;
    this.life = 1;
    this.decay = 0.025 + Math.random() * 0.03;
    this.r = 3 + Math.random() * 4;
    this.color = color;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.93; this.vy *= 0.93;
    this.life -= this.decay;
  }
  draw() {
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class Popup {
  constructor(x, y, text, color) {
    this.x = x; this.y = y;
    this.text = text; this.color = color;
    this.life = 1; this.vy = -1.5;
  }
  update() { this.y += this.vy; this.life -= 0.02; }
  draw() {
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.font = `bold ${Math.floor(W * 0.05)}px monospace`;
    ctx.fillStyle = this.color;
    ctx.textAlign = 'center';
    ctx.fillText(this.text, this.x, this.y);
    ctx.globalAlpha = 1;
  }
}

class Ripple {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.r = 10; this.life = 1;
  }
  update() { this.r += 4; this.life -= 0.06; }
  draw() {
    ctx.globalAlpha = Math.max(0, this.life * 0.6);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function spawnAnimal() {
  if (animals.length >= 12) return;
  animals.push(new Animal());
}

function spawnParticleBurst(x, y, color, count) {
  for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
}

function checkExits() {
  for (let i = animals.length - 1; i >= 0; i--) {
    const a = animals[i];
    if (a.dead) { animals.splice(i, 1); continue; }
    // Exited right edge
    if (a.x > W - GATE_W) {
      if (a.y >= gateTop() && a.y <= gateBot()) {
        // Through gate!
        score += 10;
        throughGate++;
        a.dead = true;
        spawnParticleBurst(W - GATE_W, a.y, '#7fff00', 14);
        popups.push(new Popup(W - 80, a.y, '+10', '#7fff00'));
        sfx('score');
        // Level up check
        if (score > 0 && score % 20 === 0) {
          level = Math.min(5, Math.floor(score / 20) + 1);
          spawnInterval = Math.max(50, 120 - level * 15);
          popups.push(new Popup(W / 2, H / 2, 'LEVEL ' + level + '!', '#ffd700'));
          sfx('levelup');
        }
      } else {
        // Missed gate
        score = Math.max(0, score - 5);
        a.dead = true;
        spawnParticleBurst(W - GATE_W, a.y, '#ff3333', 8);
        popups.push(new Popup(W - 80, a.y, '-5', '#ff3333'));
        sfx('lost');
      }
      animals.splice(i, 1);
    }
    // Exited left (was pushed back)
    else if (a.x < -30) {
      score = Math.max(0, score - 5);
      a.dead = true;
      popups.push(new Popup(60, a.y, '-5', '#ff3333'));
      sfx('lost');
      animals.splice(i, 1);
    }
    // Exited top/bottom far
    else if (a.y < -30 || a.y > H + 30) {
      score = Math.max(0, score - 5);
      a.dead = true;
      sfx('lost');
      animals.splice(i, 1);
    }
  }
}

function drawGround() {
  // Dusty ground gradient
  const grad = ctx.createLinearGradient(0, H * 0.9, 0, H);
  grad.addColorStop(0, '#3d2700');
  grad.addColorStop(1, '#1a0e00');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H * 0.9, W, H * 0.1);
  // Dust swirls
  ctx.strokeStyle = 'rgba(180,120,40,0.08)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    const bx = (frameCount * 0.5 + i * 120) % (W + 40) - 20;
    ctx.beginPath();
    ctx.ellipse(bx, H * 0.91, 30 + i * 10, 4, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawGate() {
  const gx = W - GATE_W;
  const gt = gateTop(), gb = gateBot();
  const postW = 10, postH = gb - gt;
  // Gate posts (top and bottom)
  // Top post
  const grd = ctx.createLinearGradient(gx - postW / 2, 0, gx + postW / 2, 0);
  grd.addColorStop(0, '#ffb300');
  grd.addColorStop(0.5, '#ffd740');
  grd.addColorStop(1, '#e65100');
  ctx.fillStyle = grd;
  ctx.fillRect(gx - postW / 2, 0, postW, gt);
  ctx.fillRect(gx - postW / 2, gb, postW, H - gb);
  // Gate opening highlight
  ctx.strokeStyle = '#ffd740';
  ctx.lineWidth = 3;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(gx, gt);
  ctx.lineTo(gx, gb);
  ctx.stroke();
  ctx.setLineDash([]);
  // Post caps
  ctx.fillStyle = '#ffd740';
  ctx.beginPath();
  ctx.arc(gx, gt, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(gx, gb, 7, 0, Math.PI * 2);
  ctx.fill();
  // GATE label
  ctx.save();
  ctx.font = `bold ${Math.floor(W * 0.03)}px monospace`;
  ctx.fillStyle = '#ffd740';
  ctx.textAlign = 'center';
  ctx.fillText('GATE', gx, (gt + gb) / 2 - 8);
  ctx.font = `bold ${Math.floor(W * 0.025)}px monospace`;
  ctx.fillStyle = '#aaa';
  ctx.fillText('+10', gx, (gt + gb) / 2 + 16);
  ctx.restore();
}

function drawHUD() {
  const pad = 14;
  const fs = Math.max(14, Math.floor(W * 0.04));
  ctx.font = `bold ${fs}px monospace`;
  ctx.textAlign = 'left';
  // Score
  ctx.fillStyle = '#ffd740';
  ctx.fillText('SCORE: ' + score, pad, pad + fs);
  // Timer
  ctx.textAlign = 'center';
  const tc = timeLeft <= 10 ? '#ff4444' : '#fff';
  ctx.fillStyle = tc;
  ctx.fillText('TIME: ' + timeLeft, W / 2, pad + fs);
  // Through gate
  ctx.textAlign = 'right';
  ctx.fillStyle = '#7fff00';
  ctx.fillText('THRU: ' + throughGate, W - pad, pad + fs);
  // Level
  ctx.textAlign = 'left';
  ctx.font = `bold ${Math.floor(fs * 0.75)}px monospace`;
  ctx.fillStyle = '#ff8c00';
  ctx.fillText('LVL ' + level, pad, pad + fs * 2.2);
  // Animals
  ctx.fillStyle = '#c8a060';
  ctx.fillText('ON FIELD: ' + animals.length, pad, pad + fs * 3.2);
}

function drawStart() {
  ctx.fillStyle = '#1a0e00';
  ctx.fillRect(0, 0, W, H);
  drawGate();
  // Title
  const ts = Math.max(36, Math.floor(W * 0.13));
  ctx.font = `bold ${ts}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd740';
  ctx.shadowColor = '#ff8c00';
  ctx.shadowBlur = 24;
  ctx.fillText('STAMPEDE', W / 2, H * 0.25);
  ctx.shadowBlur = 0;
  const sub = Math.max(12, Math.floor(W * 0.038));
  ctx.font = `${sub}px monospace`;
  ctx.fillStyle = '#c8a060';
  ctx.fillText('herd buffalo through the gate', W / 2, H * 0.34);
  // Instructions
  ctx.fillStyle = '#fff8e7';
  ctx.font = `bold ${Math.max(12, Math.floor(W * 0.034))}px monospace`;
  const lines = [
    'TAP near buffalo to SHOO them',
    'Push them through the GATE →',
    'Gate exit: +10 pts',
    'Miss gate: -5 pts',
    '60 seconds — herd as many as you can!'
  ];
  lines.forEach((l, i) => {
    ctx.fillStyle = i < 2 ? '#ffd740' : '#c8a060';
    ctx.fillText(l, W / 2, H * 0.48 + i * Math.max(22, H * 0.055));
  });
  // Tap to start
  const pulse = 0.7 + 0.3 * Math.sin(frameCount * 0.08);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ff8c00';
  ctx.font = `bold ${Math.max(16, Math.floor(W * 0.055))}px monospace`;
  ctx.fillText('TAP TO START', W / 2, H * 0.82);
  ctx.globalAlpha = 1;
  // Best
  if (best > 0) {
    ctx.font = `${Math.max(11, Math.floor(W * 0.028))}px monospace`;
    ctx.fillStyle = '#5a4020';
    ctx.fillText('BEST: ' + best, W / 2, H * 0.89);
  }
}

function drawOver() {
  ctx.fillStyle = 'rgba(10,6,0,0.88)';
  ctx.fillRect(0, 0, W, H);
  const ts = Math.max(36, Math.floor(W * 0.12));
  ctx.textAlign = 'center';
  ctx.font = `bold ${ts}px monospace`;
  ctx.fillStyle = '#ff4400';
  ctx.shadowColor = '#ff2200';
  ctx.shadowBlur = 20;
  ctx.fillText('STAMPEDE', W / 2, H * 0.22);
  ctx.shadowBlur = 0;
  ctx.font = `bold ${Math.max(14, Math.floor(W * 0.04))}px monospace`;
  ctx.fillStyle = '#ffd740';
  ctx.fillText('TIME\'S UP!', W / 2, H * 0.33);
  ctx.font = `bold ${Math.max(40, Math.floor(W * 0.14))}px monospace`;
  ctx.fillStyle = '#fff';
  ctx.fillText(score, W / 2, H * 0.5);
  ctx.font = `bold ${Math.max(11, Math.floor(W * 0.03))}px monospace`;
  ctx.fillStyle = '#c8a060';
  ctx.fillText('FINAL SCORE', W / 2, H * 0.57);
  ctx.fillText('THRU GATE: ' + throughGate + ' buffalo', W / 2, H * 0.63);
  if (score === best && best > 0) {
    ctx.fillStyle = '#ffd740';
    ctx.fillText('NEW BEST!', W / 2, H * 0.7);
  } else {
    ctx.fillStyle = '#5a4020';
    ctx.fillText('BEST: ' + best, W / 2, H * 0.7);
  }
  const pulse = 0.7 + 0.3 * Math.sin(frameCount * 0.08);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ff8c00';
  ctx.font = `bold ${Math.max(16, Math.floor(W * 0.055))}px monospace`;
  ctx.fillText('TAP TO PLAY AGAIN', W / 2, H * 0.83);
  ctx.globalAlpha = 1;
}

function startGame() {
  score = 0;
  throughGate = 0;
  level = 1;
  timeLeft = 60;
  lastTick = Date.now();
  animals = [];
  particles = [];
  popups = [];
  ripples = [];
  spawnTimer = 0;
  spawnInterval = 120;
  shooX = -1; shooY = -1; shooTimer = 0;
  // Spawn initial batch
  for (let i = 0; i < 3; i++) spawnAnimal();
  gs = 'play';
}

function update(dt) {
  frameCount++;
  // Timer
  const now = Date.now();
  if (now - lastTick >= 1000) {
    timeLeft--;
    lastTick = now;
    if (timeLeft <= 0) {
      timeLeft = 0;
      if (score > best) { best = score; localStorage.setItem('stampede_best', best); }
      sfx('gameover');
      gs = 'over';
      return;
    }
    if (timeLeft <= 10) sfx('shoo');
  }
  // Spawn
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    const count = Math.min(2 + Math.floor(level / 2), 3);
    for (let i = 0; i < count; i++) {
      setTimeout(() => { if (gs === 'play') spawnAnimal(); }, i * 200);
    }
  }
  // Shoo ripple decay
  if (shooTimer > 0) shooTimer--;
  // Update animals
  for (const a of animals) {
    if (shooTimer > 0) a.applyForce(shooX, shooY, 3.5);
    a.update();
  }
  checkExits();
  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
  // Update popups
  for (let i = popups.length - 1; i >= 0; i--) {
    popups[i].update();
    if (popups[i].life <= 0) popups.splice(i, 1);
  }
  // Update ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    ripples[i].update();
    if (ripples[i].life <= 0) ripples.splice(i, 1);
  }
}

function draw() {
  ctx.fillStyle = '#1a0e00';
  ctx.fillRect(0, 0, W, H);
  // Background subtle grid/grass
  ctx.strokeStyle = 'rgba(60,40,0,0.18)';
  ctx.lineWidth = 1;
  const gridSz = 60;
  for (let x = 0; x < W; x += gridSz) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gridSz) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  drawGround();
  drawGate();
  // Left spawn edge indicator
  ctx.strokeStyle = 'rgba(200,160,60,0.25)';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 8]);
  ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(2, H); ctx.stroke();
  ctx.setLineDash([]);
  for (const r of ripples) r.draw();
  for (const p of particles) p.draw();
  for (const a of animals) a.draw();
  for (const pu of popups) pu.draw();
  // Shoo indicator
  if (shooTimer > 0) {
    ctx.globalAlpha = shooTimer / 12 * 0.5;
    ctx.beginPath();
    ctx.arc(shooX, shooY, 80, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffd740';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  drawHUD();
}

let raf;
function loop(ts) {
  raf = requestAnimationFrame(loop);
  if (gs === 'start') {
    frameCount++;
    drawStart();
  } else if (gs === 'play') {
    update(ts);
    draw();
  } else if (gs === 'over') {
    frameCount++;
    draw();
    drawOver();
  }
}
requestAnimationFrame(loop);

// Input
cv.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (AC.state === 'suspended') AC.resume();
  const x = e.clientX, y = e.clientY;
  if (gs === 'start') { startGame(); return; }
  if (gs === 'over') { startGame(); return; }
  if (gs === 'play') {
    shooX = x; shooY = y; shooTimer = 12;
    ripples.push(new Ripple(x, y));
    sfx('shoo');
  }
});
cv.addEventListener('pointermove', e => {
  e.preventDefault();
  if (gs !== 'play') return;
  shooX = e.clientX; shooY = e.clientY;
  if (shooTimer > 0) {
    shooTimer = 12;
    ripples.push(new Ripple(shooX, shooY));
  }
});
cv.addEventListener('pointerup', e => {
  e.preventDefault();
  shooTimer = 0;
});
</script>
</body>
</html>
