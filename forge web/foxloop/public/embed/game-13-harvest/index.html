<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ultra Harvest</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#2d5a1b;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; touch-action:none; user-select:none; -webkit-user-select:none;
}
canvas { display:block; touch-action:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(typeof r==='number'?r:r[0], Math.abs(w)/2, Math.abs(h)/2);
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);   this.arcTo(x+w,y,   x+w,y+r,   r);
    this.lineTo(x+w,y+h-r); this.arcTo(x+w,y+h, x+w-r,y+h, r);
    this.lineTo(x+r,y+h);   this.arcTo(x,y+h,   x,y+h-r,   r);
    this.lineTo(x,y+r);     this.arcTo(x,y,      x+r,y,     r);
    this.closePath();
  };
}


let W, H;
function resize(){
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=W; canvas.height=H;
}
resize();
window.addEventListener('resize', resize);

// ── Constants ─────────────────────────────────────────────
const STAGES      = { EMPTY:0, GROWING:1, RIPE:2, OVERRIPE:3, DEAD:4 };
const GAP         = 10;
const HUD_H       = 72;
const SELL_H      = 82;

// ── State ─────────────────────────────────────────────────
let gs       = 'start';
let score    = 0, coins = 0, lives = 3, level = 1, basket = 0;
let best     = +localStorage.getItem('harvest_best') || 0;
let lastTs   = 0;
let plots    = [], crows = [];
let parts    = [], popups = [], floatCoins = [];
let shake    = 0, crowTimer = 0;

// ── Config per level ──────────────────────────────────────
function cfg(){
  const l = level;
  const cols = l<=1?2 : l<=2?3 : l<=3?3 : l<=5?4 : 4;
  const rows = l<=1?2 : l<=2?2 : l<=3?3 : l<=5?3 : 4;
  return {
    cols, rows,
    growMs:        Math.max(3500, 8500-l*380),
    ripeMs:        Math.max(2800, 7500-l*340),
    overripeMs:    Math.max(1600, 4500-l*260),
    crowInterval:  Math.max(2800, 11000-l*650),
    crowEatMs:     Math.max(2200, 5500-l*280),
    maxCrows:      Math.min(5, Math.max(0, l-1)),
    pricePerCrop:  8 + l*2,
  };
}

// ── Plot ─────────────────────────────────────────────────
class Plot {
  constructor(col,row){ this.col=col; this.row=row; this.reset(); }
  reset(){
    this.stage=STAGES.EMPTY; this.t=0; this.maxT=0;
    this.shake=0; this.hasCrow=false;
  }
  get x(){ return this._x; }
  get y(){ return this._y; }
}

// ── Crow ──────────────────────────────────────────────────
class Crow {
  constructor(plot){
    this.plot=plot; this.plot.hasCrow=true;
    this.eatT=0; this.eatMax=cfg().crowEatMs;
    this.wing=0; this.wingDir=1;
    // Fly-in animation
    this.flyT=0; this.flying=true;
    this.tx=plot._x+plot._w/2; this.ty=plot._y+plot._h*0.3;
    this.x=this.tx+(Math.random()<0.5?-W:W)*0.6; this.y=this.ty-80;
  }
}

// ── Layout ────────────────────────────────────────────────
let plotW, plotH, gridX, gridY, sellY;

function layoutGrid(){
  const c=cfg();
  const availW = W - 32;
  const availH = H - HUD_H - SELL_H - 20;
  plotW = Math.floor(Math.min((availW-(c.cols-1)*GAP)/c.cols, 110));
  plotH = Math.floor(Math.min((availH-(c.rows-1)*GAP)/c.rows, 95));
  gridX = (W - (plotW*c.cols + GAP*(c.cols-1)))/2;
  gridY = HUD_H + 10 + (availH - (plotH*c.rows + GAP*(c.rows-1)))/2;
  sellY = H - SELL_H;
}

function initPlots(){
  layoutGrid();
  const c=cfg();
  plots=[];
  for(let r=0;r<c.rows;r++){
    for(let col=0;col<c.cols;col++){
      const p=new Plot(col,r);
      p._x=gridX+col*(plotW+GAP);
      p._y=gridY+r*(plotH+GAP);
      p._w=plotW; p._h=plotH;
      p.stage=STAGES.GROWING;
      p.t=Math.random()*cfg().growMs; // stagger starts
      p.maxT=cfg().growMs;
      plots.push(p);
    }
  }
  crows=[];
  crowTimer=cfg().crowInterval;
}

// ── Game flow ─────────────────────────────────────────────
function startGame(){
  score=0; coins=0; lives=3; level=1; basket=0;
  parts=[]; popups=[]; floatCoins=[]; shake=0;
  initPlots(); gs='play';
}

function sell(){
  if(basket<=0) return;
  const earned = basket * cfg().pricePerCrop;
  score += earned; coins += earned;
  if(score>best){ best=score; localStorage.setItem('harvest_best',best); }
  floatCoins.push({x:W/2, y:sellY-10, val:earned, life:1.4});
  beep('sell'); shake=4;
  basket=0;
}

function harvest(p){
  if(p.stage!==STAGES.RIPE && p.stage!==STAGES.OVERRIPE) return;
  const val = p.stage===STAGES.RIPE ? 1 : 0; // overripe still harvests but worth less
  basket++;
  puff(p._x+p._w/2, p._y+p._h/2, '#ffc107');
  beep('harvest');
  p.reset();
  // Immediately start growing again
  p.stage=STAGES.GROWING; p.t=0; p.maxT=cfg().growMs;
}

function shooCrow(crow){
  crow.plot.hasCrow=false;
  crows=crows.filter(c=>c!==crow);
  puff(crow.x, crow.y, '#555');
  beep('shoo');
}

function cropDied(p){
  lives--;
  shake=14;
  puff(p._x+p._w/2, p._y+p._h/2, '#795548');
  beep('die');
  p.reset();
  p.stage=STAGES.GROWING; p.t=0; p.maxT=cfg().growMs;
  if(lives<=0) gs='over';
}

// ── Update ────────────────────────────────────────────────
function update(dt){
  if(gs!=='play') return;
  shake*=0.76; if(shake<0.1) shake=0;

  const c=cfg();

  // Plots
  plots.forEach(p=>{
    if(p.hasCrow) return; // paused while crow eats
    if(p.stage===STAGES.EMPTY) return;
    p.t+=dt;
    if(p.stage===STAGES.GROWING && p.t>=p.maxT){
      p.stage=STAGES.RIPE; p.t=0; p.maxT=c.ripeMs; beep('ripe');
    } else if(p.stage===STAGES.RIPE && p.t>=p.maxT){
      p.stage=STAGES.OVERRIPE; p.t=0; p.maxT=c.overripeMs;
    } else if(p.stage===STAGES.OVERRIPE && p.t>=p.maxT){
      cropDied(p);
    }
  });

  // Crow spawning
  if(crows.length < c.maxCrows){
    crowTimer-=dt;
    if(crowTimer<=0){
      crowTimer=c.crowInterval*(0.7+Math.random()*0.6);
      const targets=plots.filter(p=>!p.hasCrow&&(p.stage===STAGES.GROWING||p.stage===STAGES.RIPE||p.stage===STAGES.OVERRIPE));
      if(targets.length) crows.push(new Crow(targets[Math.random()*targets.length|0]));
    }
  }

  // Crows
  crows.forEach(crow=>{
    // Wing flap
    crow.wing+=dt*0.006; if(crow.wing>1){crow.wing=0;}
    // Fly-in
    if(crow.flying){
      crow.flyT+=dt;
      const p=Math.min(crow.flyT/500,1);
      const e=1-(1-p)*(1-p);
      crow.x=lerp(crow.x,crow.tx,0.08);
      crow.y=lerp(crow.y,crow.ty,0.08);
      if(Math.hypot(crow.x-crow.tx,crow.y-crow.ty)<8) crow.flying=false;
      return;
    }
    // Eating
    crow.eatT+=dt;
    if(crow.eatT>=crow.eatMax){
      crow.plot.hasCrow=false;
      cropDied(crow.plot);
      crows=crows.filter(c=>c!==crow);
    }
  });

  // Particles
  parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.vx*=0.96;p.life-=p.dec;});

  popups=popups.filter(p=>p.life>0);
  popups.forEach(p=>{p.y-=0.8;p.life-=0.018;});

  floatCoins=floatCoins.filter(p=>p.life>0);
  floatCoins.forEach(p=>{p.y-=1.2;p.life-=0.014;});

  // Level up: earn enough coins
  if(score >= level*120 + (level-1)*60){
    level++;
    popups.push({x:W/2,y:H*0.4,txt:`LEVEL ${level}!`,col:'#fff176',life:2.2,big:true});
    beep('level');
    initPlots(); // expand farm
  }
}

// ── Draw ──────────────────────────────────────────────────
function draw(){
  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#b3dff5'); sky.addColorStop(0.6,'#dff0d8'); sky.addColorStop(1,'#8fbc5a');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  if(gs==='start'){ drawStart(); return; }

  const ox=shake?(Math.random()-0.5)*shake:0;
  const oy=shake?(Math.random()-0.5)*shake:0;

  // Ground
  const ground=ctx.createLinearGradient(0,gridY-10,0,H);
  ground.addColorStop(0,'#6a994e'); ground.addColorStop(0.3,'#5a8a3e'); ground.addColorStop(1,'#3d6e2a');
  ctx.fillStyle=ground; ctx.fillRect(0,gridY-10,W,H);

  // Plots
  plots.forEach(p=>drawPlot(p,ox,oy));

  // Crows
  crows.forEach(crow=>drawCrow(crow,ox,oy));

  // Particles
  parts.forEach(p=>{
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Popups
  popups.forEach(p=>{
    ctx.save(); ctx.globalAlpha=Math.min(1,p.life*1.5);
    ctx.font=`bold ${p.big?Math.min(32,W*0.085):Math.min(20,W*0.053)}px "Black Ops One"`;
    ctx.textAlign='center'; ctx.fillStyle=p.col;
    ctx.shadowColor=p.col; ctx.shadowBlur=12;
    ctx.fillText(p.txt,p.x,p.y); ctx.shadowBlur=0; ctx.restore();
  });

  drawHUD();
  drawSellBar();

  // Floating coin amounts
  floatCoins.forEach(p=>{
    ctx.save(); ctx.globalAlpha=Math.min(1,p.life);
    ctx.font=`bold ${Math.min(26,W*0.07)}px "Black Ops One"`;
    ctx.textAlign='center'; ctx.fillStyle='#ffd740';
    ctx.shadowColor='#ff8f00'; ctx.shadowBlur=10;
    ctx.fillText(`+${p.val}`,p.x,p.y); ctx.shadowBlur=0; ctx.restore();
  });

  if(gs==='over') drawOver();
}

// ── Draw plot ─────────────────────────────────────────────
function drawPlot(p,ox,oy){
  const x=p._x+ox, y=p._y+oy, w=p._w, h=p._h;
  ctx.save();

  // Soil
  ctx.fillStyle='#5d4037';
  ctx.beginPath(); ctx.roundRect(x,y,w,h,8); ctx.fill();
  // Soil highlight
  ctx.fillStyle='#6d4c41';
  ctx.beginPath(); ctx.roundRect(x+2,y+2,w-4,h*0.4,6); ctx.fill();
  // Plot border
  ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,8); ctx.stroke();

  // Overripe flash
  if(p.stage===STAGES.OVERRIPE){
    const flash=Math.sin(Date.now()/120)>0;
    if(flash){ ctx.strokeStyle='#ff5722'; ctx.lineWidth=3; ctx.beginPath(); ctx.roundRect(x,y,w,h,8); ctx.stroke(); }
  }

  // Progress bar (grow/ripe/overripe)
  if(p.stage!==STAGES.EMPTY){
    const prog=Math.min(p.t/p.maxT,1);
    const barCol=p.stage===STAGES.GROWING?'#66bb6a':p.stage===STAGES.RIPE?'#ffc107':'#ff5722';
    ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(x+6,y+h-10,w-12,5);
    ctx.fillStyle=barCol; ctx.fillRect(x+6,y+h-10,(w-12)*prog,5);
  }

  // Crop art
  const cx=x+w/2, cy=y+h*0.6;
  const sz=Math.min(w,h)*0.38;

  if(p.stage===STAGES.GROWING){
    // Seedling — small green shoot
    ctx.strokeStyle='#81c784'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx,cy+sz*0.5); ctx.lineTo(cx,cy-sz*0.3); ctx.stroke();
    ctx.fillStyle='#a5d6a7';
    ctx.beginPath(); ctx.ellipse(cx+sz*0.3,cy-sz*0.2,sz*0.28,sz*0.16,0.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx-sz*0.2,cy,sz*0.22,sz*0.13,-0.5,0,Math.PI*2); ctx.fill();
  } else if(p.stage===STAGES.RIPE||p.stage===STAGES.OVERRIPE){
    const wilt=p.stage===STAGES.OVERRIPE;
    // Tall stalk
    ctx.strokeStyle=wilt?'#a5d6a7':'#558b2f'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(cx,cy+sz*0.6); ctx.lineTo(cx,cy-sz*0.8); ctx.stroke();
    // Big leaves
    ctx.fillStyle=wilt?'#c8e6c9':'#66bb6a';
    ctx.beginPath(); ctx.ellipse(cx+sz*0.5,cy-sz*0.1,sz*0.5,sz*0.2,0.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx-sz*0.5,cy-sz*0.4,sz*0.5,sz*0.2,-0.4,0,Math.PI*2); ctx.fill();
    // Grain/wheat head
    const hCol=wilt?'#ffe082':'#ffc107';
    ctx.fillStyle=hCol;
    ctx.beginPath(); ctx.ellipse(cx,cy-sz*1.0,sz*0.22,sz*0.45,0,0,Math.PI*2); ctx.fill();
    // Seeds
    ctx.fillStyle=wilt?'#ffcc02':'#ff8f00';
    for(let i=0;i<3;i++){
      ctx.beginPath(); ctx.arc(cx+(i-1)*sz*0.14,cy-sz*(0.72+i*0.14),sz*0.1,0,Math.PI*2); ctx.fill();
    }
    // Ripe glow
    if(!wilt){
      ctx.save(); ctx.globalAlpha=0.18+Math.sin(Date.now()/400)*0.1;
      ctx.fillStyle='#ffd740';
      ctx.beginPath(); ctx.arc(cx,cy-sz*0.5,sz*0.9,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // Crow eat progress (red bar on top of plot)
  if(p.hasCrow){
    const crow=crows.find(c=>c.plot===p);
    if(crow && !crow.flying){
      const ep=crow.eatT/crow.eatMax;
      ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(x+4,y+4,w-8,6);
      ctx.fillStyle=`hsl(${120-ep*120},100%,45%)`; ctx.fillRect(x+4,y+4,(w-8)*(1-ep),6);
    }
  }

  ctx.restore();
}

// ── Draw crow ─────────────────────────────────────────────
function drawCrow(crow,ox,oy){
  const cx=crow.x+ox, cy=crow.y+oy;
  const t=crow.wing;
  const wing=Math.sin(t*Math.PI*2)*18;
  ctx.save(); ctx.translate(cx,cy);

  // Wings
  ctx.fillStyle='#1a1a1a';
  // Left wing
  ctx.beginPath(); ctx.ellipse(-14,wing*0.5,14,7,t*0.4-0.3,0,Math.PI*2); ctx.fill();
  // Right wing
  ctx.beginPath(); ctx.ellipse(14,wing*0.5,14,7,-t*0.4+0.3,0,Math.PI*2); ctx.fill();
  // Body
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.ellipse(0,0,10,14,0,0,Math.PI*2); ctx.fill();
  // Head
  ctx.beginPath(); ctx.arc(0,-12,7,0,Math.PI*2); ctx.fill();
  // Beak (bob when eating)
  const bob=crow.flying?0:Math.sin(Date.now()/180)*3;
  ctx.fillStyle='#888';
  ctx.beginPath(); ctx.moveTo(5,-10+bob); ctx.lineTo(14,-8+bob*2); ctx.lineTo(5,-8+bob); ctx.closePath(); ctx.fill();
  // Eye
  ctx.fillStyle='#ff1744';
  ctx.beginPath(); ctx.arc(3,-13,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(3.5,-13,1.2,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

// ── HUD ───────────────────────────────────────────────────
function drawHUD(){
  // Top bar bg
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.fillRect(0,0,W,HUD_H);

  const fs=n=>Math.min(n,W*0.042);
  ctx.textAlign='left';
  ctx.font=`bold ${fs(11)}px "Black Ops One"`;
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.fillText('COINS',16,22);
  ctx.font=`bold ${fs(26)}px "Black Ops One"`;
  ctx.fillStyle='#ffd740'; ctx.fillText(score,16,52);

  ctx.textAlign='center';
  ctx.font=`bold ${fs(11)}px "Black Ops One"`;
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.fillText('LEVEL',W/2,22);
  ctx.font=`bold ${fs(26)}px "Black Ops One"`;
  ctx.fillStyle='#fff'; ctx.fillText(level,W/2,52);

  const hs=Math.max(18,Math.min(22,W*0.058));
  for(let i=0;i<3;i++){
    ctx.globalAlpha=i<lives?1:0.15;
    ctx.font=`${hs}px sans-serif`;
    ctx.fillText('❤️',W-80+(i-1)*(hs+2),50);
  }
  ctx.globalAlpha=1; ctx.textAlign='left';
}

// ── Sell bar ──────────────────────────────────────────────
function drawSellBar(){
  // BG
  const sellBg=ctx.createLinearGradient(0,sellY,0,H);
  sellBg.addColorStop(0,'rgba(0,0,0,0.5)'); sellBg.addColorStop(1,'rgba(0,0,0,0.7)');
  ctx.fillStyle=sellBg; ctx.fillRect(0,sellY,W,SELL_H);
  ctx.strokeStyle='rgba(255,215,0,0.2)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,sellY); ctx.lineTo(W,sellY); ctx.stroke();

  // Basket info
  ctx.textAlign='left';
  ctx.font=`bold ${Math.min(15,W*0.04)}px "Black Ops One"`;
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('BASKET', 20, sellY+22);
  ctx.font=`bold ${Math.min(28,W*0.074)}px "Black Ops One"`;
  ctx.fillStyle=basket>0?'#fff':'rgba(255,255,255,0.25)';
  ctx.fillText(`🌾 ×${basket}`, 20, sellY+54);

  // SELL button
  const bw=Math.min(160,W*0.42), bh=50, bx=W-bw-20, by=sellY+16;
  const canSell=basket>0;
  const pulse=canSell?(0.85+Math.sin(Date.now()/350)*0.15):1;

  ctx.save(); ctx.globalAlpha=canSell?pulse:0.3;
  const bg=ctx.createLinearGradient(bx,by,bx,by+bh);
  bg.addColorStop(0,'#ffd740'); bg.addColorStop(1,'#ff8f00');
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,12); ctx.fill();

  if(canSell){
    ctx.shadowColor='#ffd740'; ctx.shadowBlur=14;
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,12); ctx.stroke();
    ctx.shadowBlur=0;
  }

  ctx.globalAlpha=canSell?1:0.3;
  ctx.font=`bold ${Math.min(18,W*0.048)}px "Black Ops One"`;
  ctx.fillStyle='#1a0a00'; ctx.textAlign='center';
  ctx.fillText(`SELL  +${basket*cfg().pricePerCrop}`, bx+bw/2, by+bh/2+7);
  ctx.restore(); ctx.textAlign='left';
}

// ── Screens ───────────────────────────────────────────────
function drawStart(){
  ctx.textAlign='center';

  // Barn-style title plate
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.roundRect(W/2-120,H*0.26,240,90,12); ctx.fill();

  ctx.font=`bold ${Math.min(60,W*0.16)}px "Black Ops One"`;
  ctx.shadowColor='#ffd740'; ctx.shadowBlur=24;
  ctx.fillStyle='#fff'; ctx.fillText('HARVEST',W/2,H*0.36);
  ctx.shadowBlur=0;

  ctx.font=`${Math.min(14,W*0.038)}px "Black Ops One"`;
  ctx.fillStyle='rgba(255,255,200,0.65)';
  ctx.fillText('grow · harvest · sell · shoo crows',W/2,H*0.36+Math.min(60,W*0.16)*0.6);

  // Simple art: wheat stalks
  for(let i=-2;i<=2;i++){
    const wx=W/2+i*28, wy=H*0.58;
    ctx.strokeStyle='#8fbc5a'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(wx,wy); ctx.lineTo(wx,wy-44); ctx.stroke();
    ctx.fillStyle='#ffc107';
    ctx.beginPath(); ctx.ellipse(wx,wy-50,5,14,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,193,7,0.6)';
    ctx.beginPath(); ctx.arc(wx,wy-44,12,0,Math.PI*2); ctx.fill();
  }

  const pulse=0.6+Math.sin(Date.now()/520)*0.4;
  ctx.globalAlpha=pulse;
  ctx.font=`bold ${Math.min(21,W*0.056)}px "Black Ops One"`;
  ctx.fillStyle='#fff'; ctx.fillText('TAP TO PLAY',W/2,H*0.72);
  ctx.globalAlpha=1;

  if(best>0){
    ctx.font=`${Math.min(13,W*0.034)}px "Black Ops One"`;
    ctx.fillStyle='rgba(255,215,0,0.5)';
    ctx.fillText(`BEST ${best} COINS`,W/2,H*0.72+Math.min(21,W*0.056)+14);
  }
  ctx.textAlign='left';
}

function drawOver(){
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font=`bold ${Math.min(52,W*0.138)}px "Black Ops One"`;
  ctx.shadowColor='#795548'; ctx.shadowBlur=20;
  ctx.fillStyle='#bcaaa4'; ctx.fillText('BAD HARVEST',W/2,H*0.36);
  ctx.shadowBlur=0;
  ctx.font=`bold ${Math.min(18,W*0.048)}px "Black Ops One"`;
  ctx.fillStyle='#ffd740'; ctx.fillText(`${score} COINS`,W/2,H*0.48);
  ctx.fillStyle='rgba(255,215,0,0.6)'; ctx.fillText(`BEST  ${best}`,W/2,H*0.55);
  const pulse=0.6+Math.sin(Date.now()/520)*0.4;
  ctx.globalAlpha=pulse;
  ctx.font=`bold ${Math.min(20,W*0.053)}px "Black Ops One"`;
  ctx.fillStyle='#fff'; ctx.fillText('TAP TO RETRY',W/2,H*0.70);
  ctx.globalAlpha=1; ctx.textAlign='left';
}

// ── Helpers ───────────────────────────────────────────────
function puff(cx,cy,col){
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2, sp=1.5+Math.random()*3.5;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,
      r:2+Math.random()*5,col,life:1,dec:0.022+Math.random()*0.02});
  }
}
function lerp(a,b,t){ return a+(b-a)*t; }

// ── Audio ─────────────────────────────────────────────────
let ac;
function initAC(){ if(!ac) ac=new(window.AudioContext||window.webkitAudioContext)(); }
function beep(type){
  if(!ac) return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.connect(g); g.connect(ac.destination);
  const t=ac.currentTime;
  switch(type){
    case 'harvest':
      o.frequency.setValueAtTime(523,t); o.frequency.setValueAtTime(659,t+0.08);
      g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
      o.start(t); o.stop(t+0.2); break;
    case 'sell':
      o.frequency.setValueAtTime(440,t); o.frequency.setValueAtTime(554,t+0.08); o.frequency.setValueAtTime(659,t+0.16);
      g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      o.start(t); o.stop(t+0.35); break;
    case 'shoo':
      o.type='square';
      o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(200,t+0.12);
      g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
      o.start(t); o.stop(t+0.12); break;
    case 'die':
      o.type='sawtooth';
      o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(60,t+0.3);
      g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o.start(t); o.stop(t+0.3); break;
    case 'ripe':
      o.type='sine';
      o.frequency.setValueAtTime(880,t);
      g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
      o.start(t); o.stop(t+0.1); break;
    case 'level':
      o.frequency.setValueAtTime(523,t); o.frequency.setValueAtTime(784,t+0.1); o.frequency.setValueAtTime(1047,t+0.2);
      g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
      o.start(t); o.stop(t+0.45); break;
  }
}

// ── Input ─────────────────────────────────────────────────
canvas.addEventListener('pointerdown', e=>{
  initAC();
  const r=canvas.getBoundingClientRect();
  const x=(e.clientX-r.left)*(W/r.width);
  const y=(e.clientY-r.top)*(H/r.height);

  if(gs==='start'||gs==='over'){ startGame(); return; }

  // Sell bar
  if(y>=sellY){ sell(); return; }

  // Tap crow first (priority)
  let shooed=false;
  crows.forEach(crow=>{
    if(Math.hypot(x-crow.x,y-crow.y)<32){ shooCrow(crow); shooed=true; }
  });
  if(shooed) return;

  // Tap plot
  plots.forEach(p=>{
    if(x>=p._x && x<=p._x+p._w && y>=p._y && y<=p._y+p._h){
      harvest(p);
    }
  });
},{passive:true});

// ── Loop ──────────────────────────────────────────────────
function loop(ts){
  const dt=Math.min(ts-lastTs,50); lastTs=ts;
  update(dt); draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
