<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neo 02 Flick</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Special+Elite&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }

:root {
  --desk: #c8955a;
  --desk-dark: #a0713a;
  --desk-light: #dba96e;
  --grain1: #b8803a;
  --grain2: #d4a060;
  --ink: #1a1008;
  --chalk: #f5f0e8;
  --red: #c0392b;
  --blue: #2563a8;
  --green-pen: #2d7a3a;
  --shadow: rgba(0,0,0,0.35);
  --line-blue: #aac4e8;
}

body {
  background: #2a1f14;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100vw;
  height: 100dvh;
  overflow: hidden;
  font-family: 'Special Elite', cursive;
  user-select: none;
  -webkit-user-select: none;
}

#game-wrap {
  position: relative;
  width: min(100vw, calc(100dvh * 0.62));
  height: min(100dvh, calc(100vw * 1.62));
  max-width: 420px;
  max-height: 680px;
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 4px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.5);
}

/* ── OVERLAYS ── */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  background: rgba(30,18,8,0.82);
  z-index: 20;
}
.overlay.hide { display: none; }

.big-title {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(38px, 12vw, 60px);
  color: #f5f0e8;
  text-shadow: 3px 3px 0 #8b5e2a, 6px 6px 0 rgba(0,0,0,0.3);
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.sub-title {
  font-family: 'Special Elite', cursive;
  font-size: clamp(11px, 3vw, 14px);
  color: #c8955a;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.instructions {
  font-family: 'Special Elite', cursive;
  font-size: clamp(12px, 3.2vw, 15px);
  color: #d4b88a;
  text-align: center;
  line-height: 1.7;
  margin-bottom: 14px;
  max-width: 280px;
}
.instructions b { color: #f5f0e8; }

/* Tap-to-play button — plain div, no tricks */
.play-btn {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(18px, 5vw, 24px);
  letter-spacing: 3px;
  color: #1a1008;
  background: #c8955a;
  padding: 13px 44px;
  border-radius: 3px;
  cursor: pointer;
  box-shadow: 3px 3px 0 #7a4e1a, 0 0 20px rgba(200,149,90,0.3);
  transition: transform 0.1s;
  margin: 8px;
}
.play-btn:active { transform: scale(0.95) translate(2px, 2px); box-shadow: 1px 1px 0 #7a4e1a; }

.round-badge {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Special Elite', cursive;
  font-size: 11px;
  letter-spacing: 3px;
  color: #8b6a3a;
  text-transform: uppercase;
  pointer-events: none;
  z-index: 10;
}

.result-text {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(36px, 12vw, 56px);
  margin-bottom: 8px;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
}
.result-text.win  { color: #f9c74f; }
.result-text.lose { color: #e05050; }
.result-text.draw { color: #aaaaaa; }

.score-row {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(18px, 5vw, 24px);
  color: #c8955a;
  margin-bottom: 28px;
  letter-spacing: 4px;
}

/* charge bar */
#charge-wrap {
  position: absolute;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  height: 10px;
  background: rgba(0,0,0,0.3);
  border-radius: 5px;
  overflow: hidden;
  z-index: 10;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
}
#charge-wrap.visible { opacity: 1; }
#charge-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #f9c74f, #e05050);
  border-radius: 5px;
  transition: background 0.1s;
}
</style>
</head>
<body>

<div id="game-wrap">
  <canvas id="c"></canvas>
  <div class="round-badge" id="round-badge">ROUND 1</div>
  <div id="charge-wrap"><div id="charge-fill"></div></div>

  <!-- START -->
  <div class="overlay" id="start-screen">
    <div class="big-title">FLICK</div>
    <div class="sub-title">desk pen fighting</div>
    <div class="instructions">
      <b>HOLD</b> anywhere to charge · <b>RELEASE</b> to flick<br>
      Tap <b>edge</b> of your pen zone to add spin<br>
      Knock their pen off the desk · First to <b>3</b>
    </div>
    <div style="margin-bottom:12px;width:100%;max-width:340px;padding:0 12px">
      <div style="font-family:'Special Elite',cursive;font-size:11px;letter-spacing:3px;color:#8b6a3a;text-align:center;margin-bottom:6px;text-transform:uppercase">Choose your weapon</div>
      <div id="pen-picker" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"></div>
    </div>
    <div class="play-btn" id="start-btn">FIGHT</div>
  </div>

  <!-- ROUND RESULT -->
  <div class="overlay hide" id="result-screen">
    <div class="result-text" id="result-text">YOU WIN</div>
    <div class="score-row" id="score-row">0 — 0</div>
    <div class="play-btn" id="next-btn">NEXT ROUND</div>
  </div>

  <!-- GAME OVER -->
  <div class="overlay hide" id="gameover-screen">
    <div class="result-text" id="gameover-text">CHAMPION</div>
    <div class="sub-title" id="gameover-sub">you dominated</div>
    <div class="score-row" id="gameover-score">3 — 1</div>
    <div class="play-btn" id="replay-btn">REMATCH</div>
  </div>
</div>

<script>
// ── CANVAS SETUP ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(typeof r==='number'?r:r[0], Math.abs(w)/2, Math.abs(h)/2);
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);   this.arcTo(x+w,y,   x+w,y+r,   r);
    this.lineTo(x+w,y+h-r); this.arcTo(x+w,y+h, x+w-r,y+h, r);
    this.lineTo(x+r,y+h);   this.arcTo(x,y+h,   x,y+h-r,   r);
    this.lineTo(x,y+r);     this.arcTo(x,y,      x+r,y,     r);
    this.closePath();
  };
}


// ── PEN STYLES ──
const PEN_STYLES = [
  {
    id: 'ballpoint',
    name: 'Ballpoint',
    desc: 'Classic school pen',
    w: 90, h: 13,
    color: '#2563a8', capColor: '#e8e0d0',
    bodyFn: 'classic',   // rendering style
    weight: 1.0,         // affects physics bounce
  },
  {
    id: 'chunky',
    name: 'Marker',
    desc: 'Big & heavy',
    w: 80, h: 20,
    color: '#1a7a2a', capColor: '#111',
    bodyFn: 'marker',
    weight: 1.6,
  },
  {
    id: 'pencil',
    name: 'Pencil',
    desc: 'Light & spinny',
    w: 100, h: 9,
    color: '#e8c84a', capColor: '#e8897a',
    bodyFn: 'pencil',
    weight: 0.6,
  },
  {
    id: 'fountain',
    name: 'Fountain',
    desc: 'Fancy & fast',
    w: 95, h: 11,
    color: '#1a1a2e', capColor: '#c9a84c',
    bodyFn: 'fountain',
    weight: 0.85,
  },
  {
    id: 'chunky2',
    name: 'Crayon',
    desc: 'Slow but deadly',
    w: 72, h: 22,
    color: '#c0392b', capColor: '#f9e4b0',
    bodyFn: 'crayon',
    weight: 2.0,
  },
];

let selectedStyleIdx = 0;
const wrap = document.getElementById('game-wrap');

const W = 420, H = 680;
canvas.width = W;
canvas.height = H;

// ── GAME STATE ──
let playerScore = 0, aiScore = 0, round = 1;
let state = 'menu'; // menu | ready | charging | flying | ai_turn | result
let held = false, chargeStart = 0, chargePower = 0;
let raf;

// ── PEN PHYSICS ──
// PEN_W/PEN_H are now per-style via pen.style.w / pen.style.h
const DESK_PAD = 40; // edge margin before "off desk"

function makePen(x, y, angle, style, isPlayer) {
  return {
    x, y,
    angle,
    vx: 0, vy: 0,
    va: 0,
    color: style.color,
    capColor: style.capColor,
    style,
    isPlayer,
    onDesk: true,
    falling: false,
    fallProgress: 0,
    shadow: 6,
    _launched: false,
  };
}

let playerPen, aiPen;
let particles = [];
let screenShake = 0;
let lastCollisionTime = 0;

function resetPens() {
  const pStyle = PEN_STYLES[selectedStyleIdx];
  // AI always uses a random different style
  let aiIdx = (selectedStyleIdx + 1 + Math.floor(Math.random() * (PEN_STYLES.length - 1))) % PEN_STYLES.length;
  const aStyle = PEN_STYLES[aiIdx];
  playerPen = makePen(W/2, H * 0.72, 0, pStyle, true);
  aiPen     = makePen(W/2, H * 0.28, Math.PI, aStyle, false);
}

// ── DESK DRAWING ──
function drawDesk() {
  // Wood grain base
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0,   '#c4894e');
  grad.addColorStop(0.3, '#d4a060');
  grad.addColorStop(0.5, '#c08040');
  grad.addColorStop(0.7, '#cc9858');
  grad.addColorStop(1,   '#b87838');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Wood grain lines
  ctx.save();
  ctx.globalAlpha = 0.13;
  for (let i = 0; i < 18; i++) {
    const x = (i / 18) * W * 1.4 - W * 0.2;
    const wobble = Math.sin(i * 1.7) * 18;
    ctx.strokeStyle = i % 3 === 0 ? '#7a4818' : '#b06828';
    ctx.lineWidth = i % 4 === 0 ? 2.5 : 1;
    ctx.beginPath();
    ctx.moveTo(x + wobble, 0);
    ctx.bezierCurveTo(x + wobble * 0.5, H * 0.3, x - wobble * 0.8, H * 0.6, x + wobble * 0.3, H);
    ctx.stroke();
  }
  ctx.restore();

  // Ruled notebook lines on the playing surface
  ctx.save();
  ctx.globalAlpha = 0.1;
  ctx.strokeStyle = '#6090c0';
  ctx.lineWidth = 1;
  for (let y = 80; y < H - 60; y += 28) {
    ctx.beginPath();
    ctx.moveTo(30, y);
    ctx.lineTo(W - 30, y);
    ctx.stroke();
  }
  // margin line
  ctx.strokeStyle = '#e08080';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(62, 80);
  ctx.lineTo(62, H - 60);
  ctx.stroke();
  ctx.restore();

  // Scuff marks (permanent desk scratches)
  ctx.save();
  ctx.globalAlpha = 0.07;
  ctx.strokeStyle = '#3a1a00';
  ctx.lineWidth = 1.5;
  [[80,200,160,220],[300,350,360,330],[100,450,180,470],[250,180,310,190]].forEach(([x1,y1,x2,y2]) => {
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });
  ctx.restore();

  // Edge shadow (depth)
  const edgeShadow = ctx.createLinearGradient(0, 0, 0, 40);
  edgeShadow.addColorStop(0, 'rgba(0,0,0,0.35)');
  edgeShadow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = edgeShadow;
  ctx.fillRect(0, 0, W, 40);
  const edgeBot = ctx.createLinearGradient(0, H-40, 0, H);
  edgeBot.addColorStop(0, 'rgba(0,0,0,0)');
  edgeBot.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = edgeBot;
  ctx.fillRect(0, H-40, W, 40);
}

// ── ZONE DIVIDERS ──
function drawZones() {
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.strokeStyle = '#3a1a00';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([12, 8]);
  ctx.beginPath();
  ctx.moveTo(40, H/2);
  ctx.lineTo(W-40, H/2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ── PEN DRAWING ──
function drawPen(pen) {
  if (!pen.onDesk && pen.fallProgress > 1) return;

  const s = pen.style;
  const PW = s.w, PH = s.h;
  const hw = PW / 2, hh = PH / 2;

  ctx.save();
  ctx.translate(pen.x, pen.y);
  ctx.rotate(pen.angle);

  if (pen.falling) {
    const sc = Math.max(0, 1 - pen.fallProgress * 0.8);
    ctx.scale(sc, sc);
    ctx.globalAlpha = Math.max(0, 1 - pen.fallProgress);
  }

  const shadow = pen.shadow * (pen.falling ? Math.max(0,1-pen.fallProgress) : 1);

  // Drop shadow
  ctx.save();
  ctx.translate(shadow * 0.6, shadow);
  ctx.globalAlpha *= 0.3;
  ctx.fillStyle = '#000';
  roundRect(ctx, -hw, -hh, PW, PH, Math.min(4, PH*0.3));
  ctx.fill();
  ctx.restore();

  if (s.bodyFn === 'classic' || s.bodyFn === 'fountain') {
    // Gradient body
    const bg = ctx.createLinearGradient(0, -hh, 0, hh);
    bg.addColorStop(0, lighten(pen.color, 40));
    bg.addColorStop(0.45, pen.color);
    bg.addColorStop(1, darken(pen.color, 30));
    ctx.fillStyle = bg;
    roundRect(ctx, -hw, -hh, PW, PH, Math.min(4, PH*0.35));
    ctx.fill();
    // Sheen
    ctx.save(); ctx.globalAlpha = 0.22; ctx.fillStyle = '#fff';
    roundRect(ctx, -hw+3, -hh+1, PW-6, PH*0.38, 2); ctx.fill(); ctx.restore();
    // Cap
    ctx.fillStyle = pen.capColor;
    roundRect(ctx, hw - PH*1.2, -hh, PH*1.2, PH, [0, Math.min(4,PH*0.35), Math.min(4,PH*0.35), 0]);
    ctx.fill();
    // Clip
    ctx.fillStyle = s.bodyFn === 'fountain' ? '#c9a84c' : '#888';
    ctx.fillRect(hw - PH*1.5, -hh - 2, 3, PH + 4);
    // Tip
    ctx.fillStyle = s.bodyFn === 'fountain' ? '#c9a84c' : '#333';
    ctx.beginPath();
    ctx.moveTo(-hw, -hh*0.45); ctx.lineTo(-hw - PH*0.7, 0); ctx.lineTo(-hw, hh*0.45); ctx.fill();
    if (s.bodyFn === 'fountain') {
      // Nib split line
      ctx.strokeStyle = '#000'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(-hw - PH*0.7, 0); ctx.lineTo(-hw, 0); ctx.stroke();
    }

  } else if (s.bodyFn === 'marker') {
    // Thick rectangular marker
    ctx.fillStyle = pen.color;
    roundRect(ctx, -hw, -hh, PW, PH, 3);
    ctx.fill();
    // Logo stripe
    ctx.fillStyle = lighten(pen.color, 25);
    ctx.fillRect(-hw + PW*0.2, -hh, PW*0.18, PH);
    // Cap end
    ctx.fillStyle = pen.capColor;
    roundRect(ctx, hw - 14, -hh, 14, PH, [0,3,3,0]); ctx.fill();
    // Tip (flat chisel)
    ctx.fillStyle = '#111';
    ctx.fillRect(-hw - 5, -hh*0.6, 5, PH*0.6*2); // chisel shape
    // Sheen
    ctx.save(); ctx.globalAlpha = 0.15; ctx.fillStyle = '#fff';
    roundRect(ctx, -hw+4, -hh+2, PW-8, PH*0.3, 1); ctx.fill(); ctx.restore();

  } else if (s.bodyFn === 'pencil') {
    // Yellow pencil with hex cross-section feel
    const bg2 = ctx.createLinearGradient(0, -hh, 0, hh);
    bg2.addColorStop(0, '#f0d060'); bg2.addColorStop(0.5, pen.color); bg2.addColorStop(1, '#b89020');
    ctx.fillStyle = bg2;
    roundRect(ctx, -hw, -hh, PW, PH, 1); ctx.fill();
    // Wood grain lines along body
    ctx.save(); ctx.globalAlpha = 0.18; ctx.strokeStyle = '#8b6010'; ctx.lineWidth = 0.8;
    for (let lx = -hw + 12; lx < hw - 16; lx += 14) {
      ctx.beginPath(); ctx.moveTo(lx, -hh); ctx.lineTo(lx, hh); ctx.stroke();
    }
    ctx.restore();
    // Eraser
    ctx.fillStyle = pen.capColor;
    roundRect(ctx, hw - 12, -hh, 12, PH, [0,2,2,0]); ctx.fill();
    ctx.fillStyle = '#bbb'; ctx.fillRect(hw - 14, -hh, 2, PH); // eraser band
    // Sharpened tip
    ctx.fillStyle = '#f0d060';
    ctx.beginPath(); ctx.moveTo(-hw, -hh*0.7); ctx.lineTo(-hw - 10, 0); ctx.lineTo(-hw, hh*0.7); ctx.fill();
    ctx.fillStyle = '#333'; // graphite
    ctx.beginPath(); ctx.moveTo(-hw - 3, -hh*0.25); ctx.lineTo(-hw - 10, 0); ctx.lineTo(-hw - 3, hh*0.25); ctx.fill();

  } else if (s.bodyFn === 'crayon') {
    // Wide, waxy crayon
    const bg3 = ctx.createLinearGradient(0, -hh, 0, hh);
    bg3.addColorStop(0, lighten(pen.color, 30)); bg3.addColorStop(1, darken(pen.color, 20));
    ctx.fillStyle = bg3;
    roundRect(ctx, -hw, -hh, PW, PH, PH*0.25); ctx.fill();
    // Label band
    ctx.fillStyle = pen.capColor;
    ctx.fillRect(-hw + PW*0.25, -hh, PW*0.45, PH);
    ctx.fillStyle = darken(pen.color, 10);
    ctx.font = `bold ${Math.floor(PH*0.5)}px 'Special Elite', cursive`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('CRAYON', 0, 0);
    // Waxy sheen
    ctx.save(); ctx.globalAlpha = 0.2; ctx.fillStyle = '#fff';
    roundRect(ctx, -hw+4, -hh+2, PW-8, PH*0.3, PH*0.1); ctx.fill(); ctx.restore();
    // Tip
    ctx.fillStyle = darken(pen.color, 15);
    ctx.beginPath(); ctx.moveTo(-hw, -hh*0.5); ctx.lineTo(-hw-8, 0); ctx.lineTo(-hw, hh*0.5); ctx.fill();
  }

  // Player/Rival label on pen
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = lighten(pen.color, 60);
  ctx.font = `bold ${Math.floor(PH * 0.52)}px 'Special Elite', cursive`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(pen.isPlayer ? 'YOU' : 'RIVAL', 0, 0);
  ctx.restore();

  ctx.restore(); // main
}

// ── ROUNDED RECT HELPER ──
function roundRect(ctx, x, y, w, h, r) {
  if (typeof r === 'number') r = [r,r,r,r];
  ctx.beginPath();
  ctx.moveTo(x + r[0], y);
  ctx.lineTo(x + w - r[1], y);
  ctx.arcTo(x+w, y, x+w, y+r[1], r[1]);
  ctx.lineTo(x+w, y+h-r[2]);
  ctx.arcTo(x+w, y+h, x+w-r[2], y+h, r[2]);
  ctx.lineTo(x+r[3], y+h);
  ctx.arcTo(x, y+h, x, y+h-r[3], r[3]);
  ctx.lineTo(x, y+r[0]);
  ctx.arcTo(x, y, x+r[0], y, r[0]);
  ctx.closePath();
}

// ── PARTICLES ──
function spawnHitParticles(x, y) {
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd,
      life: 1,
      decay: 0.04 + Math.random() * 0.04,
      r: 1.5 + Math.random() * 3,
      color: Math.random() < 0.5 ? '#f9c74f' : '#fff'
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.12;
    p.vx *= 0.96;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── PHYSICS ──
function penCorners(pen) {
  const hw = pen.style.w / 2, hh = pen.style.h / 2;
  const cos = Math.cos(pen.angle), sin = Math.sin(pen.angle);
  return [
    [-hw, -hh], [hw, -hh], [hw, hh], [-hw, hh]
  ].map(([lx, ly]) => ({
    x: pen.x + lx * cos - ly * sin,
    y: pen.y + lx * sin + ly * cos
  }));
}

function checkPenCollision(a, b) {
  // Simple circle-circle on centers for snappy feel
  const dx = b.x - a.x, dy = b.y - a.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const minDist = ((a.style.w + b.style.w) / 2) * 0.62;
  if (dist < minDist && dist > 0) {
    const nx = dx / dist, ny = dy / dist;
    const relVx = a.vx - b.vx, relVy = a.vy - b.vy;
    const dot = relVx * nx + relVy * ny;
    if (dot > 0) {
      const imp = dot * 1.15;
      a.vx -= imp * nx; a.vy -= imp * ny;
      b.vx += imp * nx; b.vy += imp * ny;
      a.va += (Math.random() - 0.5) * 0.18;
      b.va += (Math.random() - 0.5) * 0.18;
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
      spawnHitParticles(mx, my);
      screenShake = 10;
      lastCollisionTime = Date.now();
    }
  }
}

function updatePen(pen) {
  if (pen.falling) {
    pen.fallProgress += 0.03;
    return;
  }
  pen.x += pen.vx;
  pen.y += pen.vy;
  pen.angle += pen.va;

  // Friction
  pen.vx *= 0.965;
  pen.vy *= 0.965;
  pen.va *= 0.94;

  if (Math.abs(pen.vx) < 0.01) pen.vx = 0;
  if (Math.abs(pen.vy) < 0.01) pen.vy = 0;
  if (Math.abs(pen.va) < 0.001) pen.va = 0;

  // Bounce off side walls
  const pw2 = pen.style.w * 0.4;
  if (pen.x < DESK_PAD + pw2) { pen.x = DESK_PAD + pw2; pen.vx = Math.abs(pen.vx) * 0.5; pen.va += 0.08; }
  if (pen.x > W - DESK_PAD - pw2) { pen.x = W - DESK_PAD - pw2; pen.vx = -Math.abs(pen.vx) * 0.5; pen.va -= 0.08; }

  // Off top/bottom = off desk
  if (pen.y < DESK_PAD || pen.y > H - DESK_PAD) {
    pen.falling = true;
    pen.onDesk = false;
  }
}

function pensAtRest() {
  const atRest = (p) => Math.abs(p.vx) < 0.06 && Math.abs(p.vy) < 0.06 && Math.abs(p.va) < 0.006;
  return atRest(playerPen) && atRest(aiPen);
}

function penWasLaunched(pen) {
  // True if pen has significant velocity (was actually flicked this turn)
  return pen._launched;
}

// ── CHARGE / FLICK ──
let chargeInterval;
const MAX_CHARGE = 1200; // ms

let flickOriginY = 0; // screen Y where touch started, for spin calc

function startCharge(originY) {
  if (state !== 'ready' || turn !== 'player') return;
  state = 'charging';
  chargeStart = Date.now();
  flickOriginY = originY !== undefined ? originY : playerPen.y;
  document.getElementById('charge-wrap').classList.add('visible');
}

function releaseFlick() {
  if (state !== 'charging') return;
  const elapsed = Date.now() - chargeStart;
  chargePower = Math.min(elapsed / MAX_CHARGE, 1);
  state = 'player_flying';
  document.getElementById('charge-wrap').classList.remove('visible');
  document.getElementById('charge-fill').style.width = '0%';

  // Direction: player pen always flicks toward AI (upward)
  const weight = playerPen.style.weight;
  const speed = (4 + chargePower * 14) / Math.sqrt(weight);
  // Aim at AI pen with slight random spread
  const dx = aiPen.x - playerPen.x;
  const dy = aiPen.y - playerPen.y;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  const spread = (Math.random() - 0.5) * 0.4 * (1 - chargePower * 0.6);
  playerPen.vx = (dx / len) * speed * Math.cos(spread) + Math.sin(spread) * speed * 0.3;
  playerPen.vy = (dy / len) * speed * Math.cos(spread) + Math.cos(spread) * speed * 0.3;
  // Edge hit = spin: offset from pen center (in canvas coords) drives angular velocity
  const canvasRect = canvas.getBoundingClientRect();
  const scaleY = H / canvasRect.height;
  const penY = playerPen.y;
  // flickOriginY is in canvas pixel coords
  const penHalfH = playerPen.style.h * 0.5;
  const edgeOffset = (flickOriginY - penY) / (penHalfH + 30); // normalize, -1..1 range
  const clampedOffset = Math.max(-1.2, Math.min(1.2, edgeOffset));
  const spinDir = clampedOffset;
  const spinScale = 0.38 / Math.sqrt(playerPen.style.weight);
  playerPen.va = spinDir * spinScale * chargePower + (Math.random() - 0.5) * 0.03;
  playerPen.shadow = 3;
  playerPen._launched = true;
  aiPen._launched = false;
}

// ── AI FLICK ──
function aiFlick() {
  if (!aiPen.onDesk) return;
  // AI difficulty scales with round
  const accuracy = Math.min(0.95, 0.4 + round * 0.08);
  const power = 0.4 + Math.random() * 0.6;
  const speed = 3 + power * 7;  // toned down
  const dx = playerPen.x - aiPen.x;
  const dy = playerPen.y - aiPen.y;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  const maxSpread = (1 - accuracy) * 0.8;
  const spread = (Math.random() - 0.5) * maxSpread;
  aiPen.vx = (dx / len) * speed * Math.cos(spread);
  aiPen.vy = (dy / len) * speed * Math.cos(spread);
  aiPen.va = (Math.random() - 0.5) * 0.2;
  aiPen.shadow = 3;
  aiPen._launched = true;
  playerPen._launched = false;
}

// ── CHARGE BAR UPDATE ──
function updateChargeBar() {
  if (state !== 'charging') return;
  const pct = Math.min((Date.now() - chargeStart) / MAX_CHARGE, 1) * 100;
  document.getElementById('charge-fill').style.width = pct + '%';
}

// ── HUD ──
function drawHUD() {
  // Player label (bottom)
  ctx.save();
  ctx.font = "bold 13px 'Special Elite', cursive";
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.textAlign = 'center';
  ctx.fillText('YOU', W/2, H - 14);
  ctx.fillStyle = '#f5f0e8';
  ctx.fillText('YOU', W/2 - 1, H - 15);

  // AI label (top)
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillText('RIVAL', W/2, 30);
  ctx.fillStyle = '#f5f0e8';
  ctx.fillText('RIVAL', W/2 - 1, 29);
  ctx.restore();

  // Score pips
  drawPips(playerScore, H - 36, '#2563a8');
  drawPips(aiScore, 44, '#c0392b');

  // State hint
  ctx.save();
  ctx.font = "13px 'Special Elite', cursive";
  ctx.textAlign = 'center';
  if (state === 'ready' && turn === 'player') {
    ctx.fillStyle = 'rgba(245,240,232,0.55)';
    ctx.fillText('YOUR TURN — HOLD TO CHARGE', W/2, H/2 + 2);
  } else if (state === 'ai_thinking') {
    ctx.fillStyle = 'rgba(192,57,43,0.7)';
    ctx.fillText('RIVAL IS THINKING...', W/2, H/2 + 2);
  }
  ctx.restore();
}

function drawPips(count, y, color) {
  const total = 3, r = 7, gap = 22;
  const startX = W/2 - ((total - 1) * gap) / 2;
  for (let i = 0; i < total; i++) {
    ctx.beginPath();
    ctx.arc(startX + i * gap, y, r, 0, Math.PI * 2);
    ctx.fillStyle = i < count ? color : 'rgba(255,255,255,0.15)';
    ctx.fill();
    ctx.strokeStyle = i < count ? lighten(color, 20) : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

// ── COLOUR HELPERS ──
function lighten(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (n >> 16) + amt);
  const g = Math.min(255, ((n >> 8) & 0xff) + amt);
  const b = Math.min(255, (n & 0xff) + amt);
  return `rgb(${r},${g},${b})`;
}
function darken(hex, amt) { return lighten(hex, -amt); }

// ── TURN MANAGEMENT ──
let aiTimer = null;
// whose turn: 'player' | 'ai'
let turn = 'player';

function startPlayerTurn() {
  turn = 'player';
  state = 'ready';
}

function startAITurn() {
  turn = 'ai';
  state = 'ai_thinking';
  clearTimeout(aiTimer);
  aiTimer = setTimeout(() => {
    if (state === 'ai_thinking') {
      aiFlick();
      state = 'ai_flying';
    }
  }, 600 + Math.random() * 800);
}

// ── MAIN LOOP ──
function loop() {
  raf = requestAnimationFrame(loop);

  // Screen shake
  let sx = 0, sy = 0;
  if (screenShake > 0) {
    sx = (Math.random() - 0.5) * screenShake * 1.5;
    sy = (Math.random() - 0.5) * screenShake * 1.5;
    screenShake = Math.max(0, screenShake - 1.2);
  }

  ctx.save();
  ctx.translate(sx, sy);

  drawDesk();
  drawZones();

  // Update physics
  if (state !== 'menu') {
    updatePen(playerPen);
    updatePen(aiPen);
    if (playerPen.onDesk && aiPen.onDesk) {
      checkPenCollision(playerPen, aiPen);
    }
    updateParticles();
    updateChargeBar();
  }

  drawParticles();
  if (state !== 'menu') {
    drawPen(aiPen);
    drawPen(playerPen);
    drawHUD();
  }

  ctx.restore();

  // ── STATE MACHINE ──
  if (state === 'player_flying' || state === 'ai_flying') {
    const playerFalling = !playerPen.onDesk;
    const aiFalling = !aiPen.onDesk;

    // Wait for fall animation to finish before judging
    if (playerFalling && playerPen.fallProgress < 1) return;
    if (aiFalling && aiPen.fallProgress < 1) return;

    // Someone fell off — end the round
    if (playerFalling || aiFalling) {
      checkRoundEnd();
      return;
    }

    // Both still on desk and movement stopped — hand off turn
    // Only settle once the flicked pen actually had velocity (avoid instant-settle on frame 1)
    const movedEnough = (state === 'player_flying' ? playerPen._launched : aiPen._launched);
    if (movedEnough && pensAtRest()) {
      const whoJustFlicked = state; // capture before changing
      state = 'waiting'; // lock so this block won't re-trigger
      setTimeout(() => {
        if (whoJustFlicked === 'player_flying') {
          startAITurn();
        } else {
          startPlayerTurn();
        }
      }, 400);
    }
  }
}

function checkRoundEnd() {
  if (state === 'result') return;
  const playerFell = !playerPen.onDesk;
  const aiFell = !aiPen.onDesk;
  if (!playerFell && !aiFell) {
    state = 'ready';
    scheduleAI();
    return;
  }

  state = 'round_over';
  clearTimeout(aiTimer); aiTimer = null;

  let resultText, resultClass;
  if (playerFell && aiFell) {
    resultText = 'DRAW'; resultClass = 'draw';
  } else if (aiFell) {
    playerScore++;
    resultText = 'YOU WIN!'; resultClass = 'win';
  } else {
    aiScore++;
    resultText = 'RIVAL WINS'; resultClass = 'lose';
  }

  // Check match over
  const matchOver = playerScore >= 3 || aiScore >= 3;

  if (matchOver) {
    setTimeout(() => showGameOver(), 600);
    return;
  }

  document.getElementById('result-text').textContent = resultText;
  document.getElementById('result-text').className = 'result-text ' + resultClass;
  document.getElementById('score-row').textContent = playerScore + ' — ' + aiScore;
  document.getElementById('result-screen').classList.remove('hide');
}

function showGameOver() {
  const won = playerScore >= 3;
  document.getElementById('gameover-text').textContent = won ? 'CHAMPION!' : 'SCHOOLED';
  document.getElementById('gameover-text').className = 'result-text ' + (won ? 'win' : 'lose');
  document.getElementById('gameover-sub').textContent = won ? 'the desk is yours' : 'better luck next time';
  document.getElementById('gameover-score').textContent = playerScore + ' — ' + aiScore;
  document.getElementById('gameover-screen').classList.remove('hide');
}

// ── INPUT ──
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'ready') {
    const rect = canvas.getBoundingClientRect();
    const scaleY = H / rect.height;
    const touchY = (e.touches[0].clientY - rect.top) * scaleY;
    startCharge(touchY);
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (state === 'charging') releaseFlick();
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  if (state === 'ready') {
    const rect = canvas.getBoundingClientRect();
    const scaleY = H / rect.height;
    const mouseY = (e.clientY - rect.top) * scaleY;
    startCharge(mouseY);
  }
});
canvas.addEventListener('mouseup', () => { if (state === 'charging') releaseFlick(); });

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); if (state === 'ready') startCharge(); }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') { if (state === 'charging') releaseFlick(); }
});

// ── BUTTON HANDLERS ──
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-screen').classList.add('hide');
  startMatch();
});

document.getElementById('next-btn').addEventListener('click', () => {
  document.getElementById('result-screen').classList.add('hide');
  round++;
  document.getElementById('round-badge').textContent = 'ROUND ' + round;
  resetPens();
  particles = [];
  clearTimeout(aiTimer); aiTimer = null;
  turn = 'player';
  state = 'ready';
});

document.getElementById('replay-btn').addEventListener('click', () => {
  document.getElementById('gameover-screen').classList.add('hide');
  playerScore = 0; aiScore = 0; round = 1;
  document.getElementById('round-badge').textContent = 'ROUND 1';
  startMatch();
});

function startMatch() {
  resetPens();
  particles = [];
  screenShake = 0;
  clearTimeout(aiTimer); aiTimer = null;
  turn = 'player';
  state = 'ready';
  if (!raf) loop();
}


// ── PEN PICKER INIT ──
function buildPenPicker() {
  const container = document.getElementById('pen-picker');
  container.innerHTML = '';
  PEN_STYLES.forEach((style, i) => {
    const btn = document.createElement('div');
    btn.style.cssText = `
      cursor:pointer;
      border-radius:4px;
      padding:8px 10px;
      text-align:center;
      border: 2px solid ${i === selectedStyleIdx ? style.color : 'rgba(255,255,255,0.1)'};
      background: ${i === selectedStyleIdx ? 'rgba(255,255,255,0.08)' : 'transparent'};
      transition: border-color 0.15s, background 0.15s;
      min-width:52px;
    `;
    // Mini pen preview canvas
    const mini = document.createElement('canvas');
    mini.width = 64; mini.height = 24;
    mini.style.cssText = 'display:block;width:64px;height:24px;margin:0 auto 3px';
    const mc = mini.getContext('2d');
    // Draw mini pen
    const pw = style.w * 0.75, ph = style.h * 0.75;
    const mx = 32, my = 12;
    mc.save(); mc.translate(mx, my);
    const bg = mc.createLinearGradient(0, -ph/2, 0, ph/2);
    bg.addColorStop(0, lighten(style.color, 40));
    bg.addColorStop(1, darken(style.color, 20));
    mc.fillStyle = bg;
    roundRectMini(mc, -pw/2, -ph/2, pw, ph, Math.min(3, ph*0.3));
    mc.fill();
    mc.fillStyle = style.capColor;
    roundRectMini(mc, pw/2 - ph*0.9, -ph/2, ph*0.9, ph, [0,2,2,0]);
    mc.fill();
    mc.fillStyle = '#222';
    mc.beginPath(); mc.moveTo(-pw/2,-ph*0.4); mc.lineTo(-pw/2-ph*0.6,0); mc.lineTo(-pw/2,ph*0.4); mc.fill();
    mc.restore();

    const label = document.createElement('div');
    label.textContent = style.name;
    label.style.cssText = `font-family:'Special Elite',cursive;font-size:10px;color:${i===selectedStyleIdx?'#f5f0e8':'#8b6a3a'};letter-spacing:1px`;
    const desc = document.createElement('div');
    desc.textContent = style.desc;
    desc.style.cssText = `font-family:'Special Elite',cursive;font-size:9px;color:#6a4a22;margin-top:1px`;

    btn.appendChild(mini);
    btn.appendChild(label);
    btn.appendChild(desc);
    btn.addEventListener('click', () => {
      selectedStyleIdx = i;
      buildPenPicker();
    });
    container.appendChild(btn);
  });
}

function roundRectMini(ctx, x, y, w, h, r) {
  if (typeof r === 'number') r = [r,r,r,r];
  ctx.beginPath();
  ctx.moveTo(x+r[0],y); ctx.lineTo(x+w-r[1],y); ctx.arcTo(x+w,y,x+w,y+r[1],r[1]);
  ctx.lineTo(x+w,y+h-r[2]); ctx.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
  ctx.lineTo(x+r[3],y+h); ctx.arcTo(x,y+h,x,y+h-r[3],r[3]);
  ctx.lineTo(x,y+r[0]); ctx.arcTo(x,y,x+r[0],y,r[0]); ctx.closePath();
}

buildPenPicker();

// Boot
loop();
</script>
