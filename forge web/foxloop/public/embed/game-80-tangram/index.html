<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>80 Tangram Rush</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;width:100vw;height:100dvh;height:100vh;overflow:hidden;touch-action:none}
canvas{display:block;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,state='menu',score=0,timer=0,startTime=0,puzzleIndex=0,pieces=[],selectedPiece=null,dragOffset={x:0,y:0},lastTap=0,solvedCount=0,celebrating=false,celebrateTime=0,particles=[];
const COLORS=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22'];
let audioCtx;function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}

function playSound(freq,dur,type='sine'){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0.15,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}

function playSnap(){playSound(880,0.1);playSound(1100,0.15);}
function playWin(){[0,100,200,300,400].forEach((d,i)=>setTimeout(()=>playSound(440+i*110,0.3),d));}
function playRotate(){playSound(600,0.08,'triangle');}

function resize(){
  W=canvas.width=Math.min(window.innerWidth,window.innerHeight);
  H=canvas.height=W;
}
window.addEventListener('resize',resize);resize();

const S=()=>W/6;

// Tangram pieces defined as unit polygons (relative to piece center)
// Classic tangram: 2 large triangles, 1 medium triangle, 2 small triangles, 1 square, 1 parallelogram
function makePieceTemplate(points,color){
  return {basePoints:points,color:color};
}

const templates=[
  makePieceTemplate([[-2,-2],[2,-2],[0,0]],'#e74c3c'),       // large tri 1
  makePieceTemplate([[-2,-2],[2,-2],[0,0]],'#3498db'),       // large tri 2
  makePieceTemplate([[-1.5,-1.5],[1.5,-1.5],[0,0]],'#2ecc71'),// medium tri
  makePieceTemplate([[-1,-1],[1,-1],[0,0]],'#f39c12'),       // small tri 1
  makePieceTemplate([[-1,-1],[1,-1],[0,0]],'#9b59b6'),       // small tri 2
  makePieceTemplate([[-0.7,-0.7],[0.7,-0.7],[0.7,0.7],[-0.7,0.7]],'#1abc9c'), // square
  makePieceTemplate([[-1.2,-0.5],[0,-0.5],[1.2,0.5],[0,0.5]],'#e67e22'),      // parallelogram
];

// Puzzle target positions (x, y, rotation in multiples of 45deg) for each piece
// Coordinates relative to puzzle center in unit grid
const puzzles=[
  { name:"Square", targets:[
    {x:-1,y:-1,r:0},{x:1,y:-1,r:2},{x:0,y:0,r:1},{x:-0.8,y:0.8,r:3},{x:0.8,y:0.8,r:1},{x:0,y:-0.7,r:0},{x:0,y:0.7,r:0}
  ]},
  { name:"Arrow", targets:[
    {x:0,y:-1.5,r:0},{x:0,y:-1.5,r:2},{x:0,y:0,r:0},{x:-0.5,y:1,r:1},{x:0.5,y:1,r:3},{x:0,y:0.5,r:0},{x:0,y:1.5,r:0}
  ]},
  { name:"House", targets:[
    {x:-1,y:0.5,r:3},{x:1,y:0.5,r:1},{x:0,y:-0.5,r:0},{x:-0.5,y:-1.2,r:2},{x:0.5,y:-1.2,r:0},{x:0,y:0.5,r:0},{x:0,y:1.2,r:0}
  ]},
  { name:"Cat", targets:[
    {x:-0.8,y:-0.5,r:0},{x:0.8,y:-0.5,r:2},{x:0,y:0.5,r:1},{x:-0.3,y:-1.5,r:0},{x:0.3,y:-1.5,r:2},{x:0,y:-0.8,r:1},{x:0,y:1.3,r:0}
  ]},
  { name:"Bird", targets:[
    {x:-1.2,y:0,r:1},{x:1.2,y:0,r:3},{x:0,y:-0.3,r:2},{x:-0.5,y:0.8,r:0},{x:0.5,y:0.8,r:2},{x:0,y:0.3,r:0},{x:0,y:-1,r:1}
  ]},
  { name:"Fish", targets:[
    {x:-0.5,y:-0.5,r:0},{x:0.5,y:0.5,r:2},{x:1,y:-0.2,r:1},{x:-1,y:0.3,r:3},{x:-1,y:-0.3,r:1},{x:0,y:0,r:1},{x:1,y:0.5,r:0}
  ]},
  { name:"Boat", targets:[
    {x:0,y:-0.5,r:0},{x:-1.5,y:0.5,r:3},{x:0.8,y:0,r:1},{x:0.5,y:0.8,r:2},{x:-0.5,y:0.8,r:0},{x:-0.5,y:0,r:0},{x:0.5,y:-0.8,r:0}
  ]},
];

function createPieces(){
  const s=S();
  pieces=[];
  const cx=W/2, cy=H/2;
  const puzzle=puzzles[puzzleIndex%puzzles.length];
  for(let i=0;i<7;i++){
    const t=templates[i];
    const target=puzzle.targets[i];
    // Random starting position around the edges
    const angle=Math.random()*Math.PI*2;
    const dist=W*0.3;
    const sx=cx+Math.cos(angle)*dist+(Math.random()-0.5)*W*0.2;
    const sy=cy+Math.sin(angle)*dist+(Math.random()-0.5)*H*0.2;
    const sr=Math.floor(Math.random()*8);
    pieces.push({
      x:Math.max(s*2,Math.min(W-s*2,sx)),
      y:Math.max(s*2,Math.min(H-s*2,sy)),
      rotation:sr,
      targetX:cx+target.x*s,
      targetY:cy+target.y*s,
      targetR:target.r,
      basePoints:t.basePoints,
      color:t.color,
      snapped:false,
      scale:s*0.35
    });
  }
}

function getTransformedPoints(p){
  const angle=p.rotation*Math.PI/4;
  return p.basePoints.map(pt=>{
    const rx=pt[0]*Math.cos(angle)-pt[1]*Math.sin(angle);
    const ry=pt[0]*Math.sin(angle)+pt[1]*Math.cos(angle);
    return [p.x+rx*p.scale, p.y+ry*p.scale];
  });
}

function getTargetPoints(p){
  const angle=p.targetR*Math.PI/4;
  return p.basePoints.map(pt=>{
    const rx=pt[0]*Math.cos(angle)-pt[1]*Math.sin(angle);
    const ry=pt[0]*Math.sin(angle)+pt[1]*Math.cos(angle);
    return [p.targetX+rx*p.scale, p.targetY+ry*p.scale];
  });
}

function pointInPoly(px,py,pts){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i][0],yi=pts[i][1],xj=pts[j][0],yj=pts[j][1];
    if((yi>py)!==(yj>py)&&px<(xj-xi)*(py-yi)/(yj-yi)+xi) inside=!inside;
  }
  return inside;
}

function drawPoly(pts,color,alpha=1){
  ctx.globalAlpha=alpha;
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)';
  ctx.lineWidth=2;
  ctx.stroke();
  ctx.globalAlpha=1;
}

function drawSilhouette(){
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.strokeStyle='rgba(255,255,255,0.25)';
  ctx.lineWidth=2;
  for(const p of pieces){
    const pts=getTargetPoints(p);
    ctx.beginPath();
    ctx.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
}

function checkSnap(p){
  if(p.snapped) return;
  const dist=Math.hypot(p.x-p.targetX,p.y-p.targetY);
  const rotMatch=(p.rotation%8===((p.targetR%8)+8)%8);
  if(dist<S()*0.5&&rotMatch){
    p.x=p.targetX;
    p.y=p.targetY;
    p.snapped=true;
    playSnap();
    if(pieces.every(pp=>pp.snapped)){
      celebrating=true;
      celebrateTime=0;
      solvedCount++;
      score+=Math.max(100,1000-Math.floor(timer));
      createParticles();
      playWin();
      setTimeout(()=>{
        celebrating=false;
        puzzleIndex++;
        if(puzzleIndex>=puzzles.length){
          state='gameover';
        } else {
          createPieces();
        }
      },2500);
    }
  }
}

function createParticles(){
  particles=[];
  for(let i=0;i<80;i++){
    particles.push({
      x:W/2,y:H/2,
      vx:(Math.random()-0.5)*12,
      vy:(Math.random()-0.5)*12-3,
      life:1,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      size:Math.random()*8+3
    });
  }
}

function updateParticles(dt){
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=dt*0.5;
  }
  particles=particles.filter(p=>p.life>0);
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;
}

function drawMenu(){
  ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
  const t=Date.now()/1000;
  // Draw rotating tangram pieces as decoration
  for(let i=0;i<7;i++){
    const angle=t*0.5+i*Math.PI*2/7;
    const r=W*0.25;
    const x=W/2+Math.cos(angle)*r;
    const y=H/2+Math.sin(angle)*r;
    ctx.save();ctx.translate(x,y);ctx.rotate(angle);
    ctx.fillStyle=COLORS[i];ctx.globalAlpha=0.6;
    ctx.beginPath();ctx.moveTo(-20,-20);ctx.lineTo(20,-20);ctx.lineTo(0,10);ctx.closePath();ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha=1;
  ctx.fillStyle='#fff';ctx.textAlign='center';
  ctx.font=`bold ${W*0.1}px Arial`;
  ctx.fillText('TANGRAM',W/2,H*0.35);
  ctx.font=`${W*0.035}px Arial`;
  ctx.fillStyle='#aaa';
  ctx.fillText('Drag pieces to fill the silhouette',W/2,H*0.45);
  ctx.fillText('Tap piece to select, double-tap to rotate',W/2,H*0.5);
  ctx.fillText(puzzles.length+' puzzles to solve',W/2,H*0.55);
  ctx.font=`${W*0.05}px Arial`;
  ctx.fillStyle='#f39c12';
  const pulse=0.8+Math.sin(t*3)*0.2;
  ctx.globalAlpha=pulse;
  ctx.fillText('TAP TO START',W/2,H*0.7);
  ctx.globalAlpha=1;
}

function drawGameOver(){
  ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#2ecc71';
  ctx.font=`bold ${W*0.09}px Arial`;
  ctx.fillText('COMPLETE!',W/2,H*0.3);
  ctx.fillStyle='#fff';
  ctx.font=`${W*0.05}px Arial`;
  ctx.fillText('Puzzles Solved: '+solvedCount,W/2,H*0.42);
  ctx.fillText('Score: '+score,W/2,H*0.5);
  ctx.fillText('Time: '+Math.floor(timer)+'s',W/2,H*0.58);
  ctx.fillStyle='#f39c12';
  ctx.font=`${W*0.04}px Arial`;
  const pulse=0.8+Math.sin(Date.now()/300)*0.2;
  ctx.globalAlpha=pulse;
  ctx.fillText('TAP TO PLAY AGAIN',W/2,H*0.72);
  ctx.globalAlpha=1;
  drawParticles();
}

function drawGame(){
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  // Grid background
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  const gs=W/20;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  drawSilhouette();

  // Draw pieces (selected piece last)
  const sorted=[...pieces].sort((a,b)=>(a===selectedPiece?1:0)-(b===selectedPiece?1:0));
  for(const p of sorted){
    const pts=getTransformedPoints(p);
    const alpha=p.snapped?0.9:0.8;
    drawPoly(pts,p.color,alpha);
    if(p.snapped){
      ctx.strokeStyle='#fff';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
      ctx.closePath();ctx.stroke();
    }
    if(p===selectedPiece&&!p.snapped){
      ctx.strokeStyle='#ff0';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
      ctx.closePath();ctx.stroke();
    }
  }

  // HUD
  ctx.fillStyle='#fff';ctx.textAlign='left';
  ctx.font=`${W*0.035}px Arial`;
  const puzzle=puzzles[puzzleIndex%puzzles.length];
  ctx.fillText('Puzzle: '+puzzle.name,10,W*0.05);
  ctx.fillText((puzzleIndex+1)+'/'+puzzles.length,10,W*0.09);
  ctx.textAlign='right';
  ctx.fillText('Score: '+score,W-10,W*0.05);
  ctx.fillText('Time: '+Math.floor(timer)+'s',W-10,W*0.09);

  if(celebrating){
    ctx.textAlign='center';
    ctx.fillStyle='#2ecc71';
    ctx.font=`bold ${W*0.08}px Arial`;
    const scale=1+Math.sin(celebrateTime*10)*0.1;
    ctx.save();ctx.translate(W/2,H/2);ctx.scale(scale,scale);
    ctx.fillText('SOLVED!',0,0);
    ctx.restore();
  }
  drawParticles();
}

let lastTime=0;
function gameLoop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;
  if(state==='play'&&!celebrating) timer+=dt;
  if(celebrating) celebrateTime+=dt;
  updateParticles(dt);

  if(state==='menu') drawMenu();
  else if(state==='play') drawGame();
  else if(state==='gameover') drawGameOver();
  requestAnimationFrame(gameLoop);
}

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return {x:(t.clientX-r.left)*(W/r.width),y:(t.clientY-r.top)*(H/r.height)};
}

function handleDown(e){
  e.preventDefault();initAudio();
  const pos=getPos(e);
  if(state==='menu'){
    audioCtx.resume();
    state='play';score=0;timer=0;puzzleIndex=0;solvedCount=0;
    createPieces();return;
  }
  if(state==='gameover'){
    state='menu';return;
  }
  if(state==='play'&&!celebrating){
    const now=Date.now();
    // Find piece under touch (reverse order for top-most)
    let found=null;
    for(let i=pieces.length-1;i>=0;i--){
      if(pieces[i].snapped) continue;
      const pts=getTransformedPoints(pieces[i]);
      if(pointInPoly(pos.x,pos.y,pts)){found=pieces[i];break;}
    }
    if(found){
      if(now-lastTap<350&&found===selectedPiece){
        // Double tap = rotate
        found.rotation=(found.rotation+1)%8;
        playRotate();
        checkSnap(found);
      }
      selectedPiece=found;
      dragOffset.x=pos.x-found.x;
      dragOffset.y=pos.y-found.y;
      // Move to top
      pieces=pieces.filter(p=>p!==found);
      pieces.push(found);
      playSound(400,0.05);
    }
    lastTap=now;
  }
}

function handleMove(e){
  e.preventDefault();
  if(state==='play'&&selectedPiece&&!selectedPiece.snapped){
    const pos=getPos(e);
    selectedPiece.x=pos.x-dragOffset.x;
    selectedPiece.y=pos.y-dragOffset.y;
  }
}

function handleUp(e){
  e.preventDefault();
  if(selectedPiece&&!selectedPiece.snapped){
    checkSnap(selectedPiece);
  }
}

canvas.addEventListener('mousedown',handleDown);
canvas.addEventListener('mousemove',handleMove);
canvas.addEventListener('mouseup',handleUp);
canvas.addEventListener('touchstart',handleDown,{passive:false});
canvas.addEventListener('touchmove',handleMove,{passive:false});
canvas.addEventListener('touchend',handleUp,{passive:false});

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
