[build]
  base = "forge web/foxloop"
  command = "npm run build"
  publish = ".next"

[build.processing.html]
  pretty_urls = false

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/forge-demo.html"
  to = "/forge-demo"
  status = 301
  force = true

[[redirects]]
  from = "/forge-demo"
  to = "/forge-demo.html"
  status = 200

[[redirects]]
  from = "/war-game.html"
  to = "/war-game"
  status = 301
  force = true

[[redirects]]
  from = "/war-game"
  to = "/war-game.html"
  status = 200

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.png"
  status = 200
